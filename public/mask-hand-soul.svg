<svg width="1600" height="400" viewBox="0 0 1600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Exact Center Plus -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="240" font-weight="900" font-family="Arial, sans-serif" fill="black">+</text>
  
  <!-- Left Text -->
  <text x="44%" y="50%" dominant-baseline="middle" text-anchor="end" font-size="240" font-weight="900" font-family="Arial, sans-serif" fill="black" letter-spacing="0.05em">HAND</text>
  
  <!-- Right Text -->
  <text x="56%" y="50%" dominant-baseline="middle" text-anchor="start" font-size="240" font-weight="900" font-family="Arial, sans-serif" fill="black" letter-spacing="0.05em">SOUL</text>
</svg>
